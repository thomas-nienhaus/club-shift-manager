[build]
builder = "nixpacks"
buildCommand = "PORT=3000 BASE_PATH=/ pnpm --filter @workspace/kantine-planner run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "pnpm --filter @workspace/db run push && node artifacts/api-server/dist/index.cjs"
restartPolicyType = "on-failure"
restartPolicyMaxRetries = 3
