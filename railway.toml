[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @workspace/db run push && PORT=3000 BASE_PATH=/ NODE_ENV=production pnpm run build"

[deploy]
startCommand = "node artifacts/api-server/dist/index.cjs"
healthcheckPath = "/api/healthz"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
