openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Voetbalclub Kantine Planner API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: seasons
    description: Season management
  - name: volunteers
    description: Volunteer management
  - name: shifts
    description: Shift management
  - name: assignments
    description: Volunteer shift assignments
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /availability-slots:
    get:
      operationId: listAvailabilitySlots
      tags: [availability-slots]
      summary: List all availability slot options
      responses:
        "200":
          description: List of availability slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailabilitySlot"
    post:
      operationId: createAvailabilitySlot
      tags: [availability-slots]
      summary: Create a new availability slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAvailabilitySlotRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilitySlot"

  /availability-slots/{id}:
    patch:
      operationId: updateAvailabilitySlot
      tags: [availability-slots]
      summary: Update an availability slot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAvailabilitySlotRequest"
      responses:
        "200":
          description: Updated slot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilitySlot"
    delete:
      operationId: deleteAvailabilitySlot
      tags: [availability-slots]
      summary: Delete an availability slot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /seasons:
    get:
      operationId: listSeasons
      tags: [seasons]
      summary: List all seasons
      responses:
        "200":
          description: List of seasons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Season"
    post:
      operationId: createSeason
      tags: [seasons]
      summary: Create a season
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSeasonRequest"
      responses:
        "201":
          description: Season created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Season"

  /seasons/{id}:
    get:
      operationId: getSeason
      tags: [seasons]
      summary: Get a season by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Season found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Season"
        "404":
          description: Not found
    delete:
      operationId: deleteSeason
      tags: [seasons]
      summary: Delete a season
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /seasons/{id}/import:
    post:
      operationId: importSeasonSchedule
      tags: [seasons]
      summary: Import shifts from xlsx file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "200":
          description: Shifts imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  /volunteers:
    get:
      operationId: listVolunteers
      tags: [volunteers]
      summary: List all volunteers
      responses:
        "200":
          description: List of volunteers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Volunteer"
    post:
      operationId: createVolunteer
      tags: [volunteers]
      summary: Create a volunteer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVolunteerRequest"
      responses:
        "201":
          description: Volunteer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Volunteer"

  /volunteers/{id}:
    get:
      operationId: getVolunteer
      tags: [volunteers]
      summary: Get a volunteer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Volunteer found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Volunteer"
        "404":
          description: Not found
    put:
      operationId: updateVolunteer
      tags: [volunteers]
      summary: Update a volunteer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVolunteerRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Volunteer"
    delete:
      operationId: deleteVolunteer
      tags: [volunteers]
      summary: Delete a volunteer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /shifts:
    get:
      operationId: listShifts
      tags: [shifts]
      summary: List all shifts
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: seasonId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of shifts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShiftWithAssignments"
    post:
      operationId: createShift
      tags: [shifts]
      summary: Create a shift
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShiftRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShiftWithAssignments"

  /shifts/{id}:
    get:
      operationId: getShift
      tags: [shifts]
      summary: Get a shift by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShiftWithAssignments"
        "404":
          description: Not found
    put:
      operationId: updateShift
      tags: [shifts]
      summary: Update a shift
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShiftRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShiftWithAssignments"
    delete:
      operationId: deleteShift
      tags: [shifts]
      summary: Delete a shift
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /shifts/auto-schedule:
    post:
      operationId: autoSchedule
      tags: [assignments]
      summary: Automatically distribute volunteers across shifts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutoScheduleRequest"
      responses:
        "200":
          description: Scheduling complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoScheduleResult"

  /shifts/{id}/assign:
    post:
      operationId: assignVolunteer
      tags: [assignments]
      summary: Assign a volunteer to a shift
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignVolunteerRequest"
      responses:
        "201":
          description: Assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShiftWithAssignments"

  /shifts/{id}/unassign/{volunteerId}:
    delete:
      operationId: unassignVolunteer
      tags: [assignments]
      summary: Remove a volunteer from a shift
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: volunteerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unassigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShiftWithAssignments"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Unauthorized

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Not authenticated

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /auth/profile:
    patch:
      operationId: updateMyProfile
      tags: [auth]
      summary: Update own profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProfileResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    DeleteResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]

    Season:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        shiftCount:
          type: integer
        createdAt:
          type: string
      required: [id, name, startDate, endDate, shiftCount, createdAt]

    CreateSeasonRequest:
      type: object
      properties:
        name:
          type: string
        startDate:
          type: string
        endDate:
          type: string
      required: [name, startDate, endDate]

    ImportResult:
      type: object
      properties:
        shiftsCreated:
          type: integer
        datesProcessed:
          type: integer
        skipped:
          type: integer
        message:
          type: string
      required: [shiftsCreated, datesProcessed, skipped, message]

    Volunteer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        hasPassword:
          type: boolean
          description: "True als er een wachtwoord is ingesteld voor dit account"
        isAdmin:
          type: boolean
          description: "True als deze vrijwilliger beheerdersrechten heeft"
        availability:
          type: array
          items:
            $ref: "#/components/schemas/ShiftSlot"
        groupId:
          type: integer
          nullable: true
        groupMembers:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
            required: [id, name]
        createdAt:
          type: string
      required: [id, name, availability, groupMembers, createdAt]

    CreateVolunteerRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        password:
          type: string
          nullable: true
          description: "Wachtwoord voor vrijwilliger login (wordt gehasht opgeslagen)"
        isAdmin:
          type: boolean
          nullable: true
          description: "Geeft de vrijwilliger beheerdersrechten"
        availability:
          type: array
          items:
            $ref: "#/components/schemas/ShiftSlot"
        groupMemberIds:
          type: array
          nullable: true
          items:
            type: integer
      required: [name]

    ShiftSlot:
      type: string

    AvailabilitySlot:
      type: object
      properties:
        id:
          type: integer
        key:
          type: string
        label:
          type: string
        sortOrder:
          type: integer
        isActive:
          type: boolean
        startTime:
          type: string
          nullable: true
          description: "Starttijd in HH:MM formaat, bijv. 09:00"
        endTime:
          type: string
          nullable: true
          description: "Eindtijd in HH:MM formaat, bijv. 13:00"
        createdAt:
          type: string
      required: [id, key, label, sortOrder, isActive, createdAt]

    CreateAvailabilitySlotRequest:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        sortOrder:
          type: integer
          nullable: true
        isActive:
          type: boolean
          nullable: true
        startTime:
          type: string
          nullable: true
        endTime:
          type: string
          nullable: true
      required: [key, label]

    UpdateAvailabilitySlotRequest:
      type: object
      properties:
        label:
          type: string
          nullable: true
        sortOrder:
          type: integer
          nullable: true
        isActive:
          type: boolean
          nullable: true
        startTime:
          type: string
          nullable: true
        endTime:
          type: string
          nullable: true

    Shift:
      type: object
      properties:
        id:
          type: integer
        seasonId:
          type: integer
          nullable: true
        date:
          type: string
        slot:
          $ref: "#/components/schemas/ShiftSlot"
        startTime:
          type: string
          nullable: true
        endTime:
          type: string
          nullable: true
        capacity:
          type: integer
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, date, slot, capacity, createdAt]

    ShiftWithAssignments:
      allOf:
        - $ref: "#/components/schemas/Shift"
        - type: object
          properties:
            assignments:
              type: array
              items:
                $ref: "#/components/schemas/Assignment"
          required: [assignments]

    Assignment:
      type: object
      properties:
        id:
          type: integer
        shiftId:
          type: integer
        volunteerId:
          type: integer
        volunteer:
          $ref: "#/components/schemas/Volunteer"
        createdAt:
          type: string
      required: [id, shiftId, volunteerId, volunteer, createdAt]

    CreateShiftRequest:
      type: object
      properties:
        seasonId:
          type: integer
          nullable: true
        date:
          type: string
        slot:
          $ref: "#/components/schemas/ShiftSlot"
        startTime:
          type: string
          nullable: true
        endTime:
          type: string
          nullable: true
        capacity:
          type: integer
        notes:
          type: string
          nullable: true
      required: [date, slot, capacity]

    UpdateShiftRequest:
      type: object
      properties:
        date:
          type: string
        slot:
          $ref: "#/components/schemas/ShiftSlot"
        startTime:
          type: string
          nullable: true
        endTime:
          type: string
          nullable: true
        capacity:
          type: integer
        notes:
          type: string
          nullable: true

    AutoScheduleRequest:
      type: object
      properties:
        seasonId:
          type: integer
          nullable: true
      required: []

    AutoScheduleResult:
      type: object
      properties:
        shiftsScheduled:
          type: integer
        assignmentsMade:
          type: integer
        message:
          type: string
      required: [shiftsScheduled, assignmentsMade, message]

    AssignVolunteerRequest:
      type: object
      properties:
        volunteerId:
          type: integer
      required: [volunteerId]

    LoginRequest:
      type: object
      properties:
        username:
          type: string
          nullable: true
        password:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
          description: "E-mailadres voor vrijwilliger login"

    LoginResponse:
      type: object
      properties:
        role:
          type: string
          enum: [admin, volunteer]
        message:
          type: string
      required: [role, message]

    CurrentUser:
      type: object
      properties:
        role:
          type: string
          enum: [admin, volunteer]
        username:
          type: string
      required: [role, username]

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        password:
          type: string
          nullable: true
          description: "Nieuw wachtwoord (leeg = ongewijzigd)"

    UpdateProfileResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        hasPassword:
          type: boolean
      required: [id, name, hasPassword]
